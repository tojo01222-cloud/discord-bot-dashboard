{% extends "admin_base.html" %}
{% block title %}Mein Account — Admin-Panel{% endblock %}
{% block content %}
<h1>Mein Account</h1>
<p style="color:#9297ab;">Angemeldet als <strong>{{ admin.username }}</strong>{% if admin.is_superadmin %} (Superadmin){% endif %}</p>

<form method="post" action="/admin/account" class="admin-form" style="margin-top:24px;">
    <div>
        <label for="new_password">Neues Passwort</label>
        <input type="password" id="new_password" name="new_password" required minlength="8">
    </div>
    <div>
        <label for="new_password_repeat">Neues Passwort wiederholen</label>
        <input type="password" id="new_password_repeat" name="new_password_repeat" required minlength="8">
    </div>
    <button type="submit" class="btn">Passwort ändern</button>
</form>
{% endblock %}
