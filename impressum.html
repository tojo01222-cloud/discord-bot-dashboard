{% extends "admin_base.html" %}
{% block title %}Feature-Flags — Admin-Panel{% endblock %}
{% block content %}
<h1>Feature-Flags</h1>
<p style="color:#9297ab; font-size:13px;">Globale Ein/Aus-Schalter für einzelne Bot-Module, ohne Code-Änderung.</p>

<form method="post" action="/admin/feature-flags" class="admin-form">
    {% for key in known_keys %}
    <label style="display:flex; align-items:center; gap:8px; font-size:14px;">
        <input type="checkbox" name="flag_{{ key }}" value="on" {% if flags_by_key.get(key, True) %}checked{% endif %}>
        {{ key }}
    </label>
    {% endfor %}
    <button type="submit" class="btn btn-small">Speichern</button>
</form>
{% endblock %}
