{% extends "base.html" %}
{% block title %}Changelog{% endblock %}
{% block content %}
<a href="/" class="back-link">← Back</a>
<h1>Changelog</h1>

{% for e in entries %}
<div class="feature-card" style="margin-bottom:16px;">
    <h3>{{ e.version }}</h3>
    <p style="color:#9297ab; font-size:12px; margin-bottom:8px;">{{ e.created_at.strftime('%d.%m.%Y') }}</p>
    <p style="color:#f5f6fa;">{{ e.description }}</p>
</div>
{% else %}
<p style="color:#9297ab;">Noch keine Einträge.</p>
{% endfor %}
{% endblock %}
