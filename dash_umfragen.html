{% extends "admin_base.html" %}
{% block title %}Server-Notizen — Admin-Panel{% endblock %}
{% block content %}
<h1>Server-Notizen — Server-ID {{ guild_id }}</h1>

{% for n in notes %}
<div class="admin-card">
    <p>{{ n.note }}</p>
    <div style="display:flex; justify-content:space-between; font-size:12px; color:#9297ab;">
        <span>{{ n.created_at.strftime('%d.%m.%Y %H:%M') }}</span>
        <form method="post" action="/admin/server-notizen/{{ guild_id }}/{{ n.id }}/loeschen">
            <button type="submit" class="btn btn-small btn-ghost">Löschen</button>
        </form>
    </div>
</div>
{% else %}
<p style="color:#9297ab;">Noch keine Notizen.</p>
{% endfor %}

<form method="post" action="/admin/server-notizen/{{ guild_id }}" class="admin-form">
    <div><label for="note">Neue Notiz</label><textarea id="note" name="note" required></textarea></div>
    <button type="submit" class="btn btn-small">Speichern</button>
</form>
{% endblock %}
