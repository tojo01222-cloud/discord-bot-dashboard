{% extends "base.html" %}
{% block title %}Feedback{% endblock %}
{% block content %}
<a href="/servers" class="back-link">← Zurück</a>
<h1>Feedback & Bugreports</h1>
<p>Hast du einen Fehler gefunden oder einen Verbesserungsvorschlag? Schreib es uns.</p>

<form method="post" action="/feedback" class="settings-form">
    <div class="field">
        <label for="message">Deine Nachricht</label>
        <textarea id="message" name="message" required rows="5"
                  style="background:#14151f;border:1px solid #262838;color:#f5f6fa;padding:11px 14px;border-radius:10px;font-family:inherit;"></textarea>
    </div>
    <button type="submit" class="btn">Absenden</button>
</form>
{% endblock %}
