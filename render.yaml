# Render "Blueprint"-Datei. Wenn du dieses Repo bei Render als Blueprint
# verbindest, liest Render diese Datei automatisch und schlägt die richtigen
# Einstellungen (Build-Befehl, Start-Befehl, benötigte Umgebungsvariablen)
# direkt vor -- du musst nur noch die Geheimwerte eintragen, nicht die
# ganze Konfiguration von Hand aufbauen.
services:
  - type: web
    name: discord-bot-dashboard
    env: python
    plan: free
    buildCommand: "pip install -r dashboard/requirements.txt"
    startCommand: "uvicorn dashboard.backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BOT_OWNER_ID
        sync: false
      - key: DEFAULT_LANGUAGE
        value: de
      - key: SESSION_SECRET
        generateValue: true
