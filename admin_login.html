<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwei-Faktor-Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="content">
        <div class="login-box">
            <h1>Zwei-Faktor-Code</h1>
            <p>Gib den 6-stelligen Code aus deiner Authenticator-App ein.</p>
            {% for message in messages %}
            <div class="flash flash-{{ message.type }}">{{ message.text }}</div>
            {% endfor %}
            <form method="post" action="/admin/login/2fa" class="settings-form" style="text-align:left; margin-top:20px;">
                <div class="field">
                    <label for="code">Code</label>
                    <input type="text" id="code" name="code" required maxlength="6" pattern="[0-9]{6}" autofocus>
                </div>
                <button type="submit" class="btn">Bestätigen</button>
            </form>
        </div>
    </main>
</body>
</html>
