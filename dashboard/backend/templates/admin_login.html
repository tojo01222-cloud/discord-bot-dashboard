<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="content">
        <div class="login-box">
            <h1>🛡️ Admin-Panel</h1>
            <p>Getrennter Login, unabhängig vom normalen Discord-Login.</p>
            {% for message in messages %}
            <div class="flash flash-{{ message.type }}">{{ message.text }}</div>
            {% endfor %}
            <form method="post" action="/admin/login" class="settings-form" style="text-align:left; margin-top:20px;">
                <div class="field">
                    <label for="username">Benutzername</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="field">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">Anmelden</button>
            </form>
        </div>
    </main>
</body>
</html>
